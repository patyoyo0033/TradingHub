<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TradingHub - Record New Trade</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#0b1326",
                        "surface-container": "#171f33",
                        "on-surface": "#dae2fd",
                        "inverse-on-surface": "#283044",
                        "on-primary-fixed-variant": "#3323cc",
                        "surface-dim": "#0b1326",
                        "surface-tint": "#c3c0ff",
                        "on-error-container": "#ffdad6",
                        "primary": "#c3c0ff",
                        "secondary-fixed-dim": "#4edea3",
                        "primary-fixed": "#e2dfff",
                        "primary-container": "#4f46e5",
                        "on-secondary-container": "#00311f",
                        "tertiary-container": "#bf0f3c",
                        "on-error": "#690005",
                        "on-primary-container": "#dad7ff",
                        "on-tertiary-container": "#ffd0d2",
                        "surface-variant": "#2d3449",
                        "error-container": "#93000a",
                        "on-background": "#dae2fd",
                        "on-secondary-fixed": "#002113",
                        "on-tertiary-fixed-variant": "#92002a",
                        "surface-container-lowest": "#060e20",
                        "on-primary": "#1d00a5",
                        "inverse-primary": "#4d44e3",
                        "outline-variant": "#464555",
                        "surface-container-highest": "#2d3449",
                        "surface-bright": "#31394d",
                        "secondary-container": "#00a572",
                        "on-tertiary-fixed": "#40000d",
                        "surface-container-high": "#222a3d",
                        "inverse-surface": "#dae2fd",
                        "surface-container-low": "#131b2e",
                        "on-tertiary": "#67001b",
                        "on-primary-fixed": "#0f0069",
                        "secondary": "#4edea3",
                        "background": "#0b1326",
                        "outline": "#918fa1",
                        "primary-fixed-dim": "#c3c0ff",
                        "secondary-fixed": "#6ffbbe",
                        "tertiary-fixed-dim": "#ffb2b7",
                        "on-surface-variant": "#c7c4d8",
                        "on-secondary-fixed-variant": "#005236",
                        "tertiary-fixed": "#ffdadb",
                        "on-secondary": "#003824",
                        "tertiary": "#ffb2b7",
                        "error": "#ffb4ab"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col md:flex-row antialiased">
<!-- TopAppBar (Web & Tablet) -->
<header class="hidden md:flex justify-between items-center w-full px-6 py-3 bg-[#0b1326]/80 backdrop-blur-xl docked full-width top-0 z-50 bg-[#161f31] shadow-[0_12px_32px_rgba(11,19,38,0.4)] absolute w-full top-0">
<div class="flex items-center gap-6">
<span class="text-xl font-black tracking-tighter text-[#dae2fd]">TradingHub</span>
<nav class="flex gap-4">
<a class="text-[#c7c4d8] hover:text-[#dae2fd] transition-colors font-['Inter'] tracking-tight" href="#">Dashboard</a>
<a class="text-[#c3c0ff] border-b-2 border-[#4f46e5] font-bold font-['Inter'] tracking-tight" href="#">Journal</a>
<a class="text-[#c7c4d8] hover:text-[#dae2fd] transition-colors font-['Inter'] tracking-tight" href="#">Knowledge</a>
<a class="text-[#c7c4d8] hover:text-[#dae2fd] transition-colors font-['Inter'] tracking-tight" href="#">Assets</a>
</nav>
</div>
<div class="flex items-center gap-4">
<button class="text-[#c7c4d8] hover:bg-[#1c263d] transition-all p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="text-[#c7c4d8] hover:bg-[#1c263d] transition-all p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined">settings</span>
</button>
<img alt="Trader Profile" class="w-8 h-8 rounded-full border-2 border-outline-variant" data-alt="close-up portrait of a young male professional in a dark studio setting with cinematic rim lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuChzwssnnfBTGqF21zYDQCVADIeI4zi-fB_0QdxjvA4_6RRxftXG2jXpx9GXNg7-AWT5xEr4zDJnjFJNFj1Q0rUIXU6bopC_F0K808hrHFa-Ms-u45clM7mGTQv9Op6bdQ0C407kfvmTBynn56oztUdfiT1UD4NP6cR-00w3HAlCnkxUTTsWnv0rqPBiE9qtKnvVi6kAMtNHhslM27Mx4Z2l-qy3uKbDytDGvkmKR5rCyZx5QnPnOP--34dzlN-aeCzo-6YfROs0DBt"/>
</div>
</header>
<!-- SideNavBar (Web - Suppressed for transactional form, keeping layout simple) -->
<!-- For a focused data entry screen, the side nav is often suppressed or minimized. We'll omit it to prioritize the form canvas. -->
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col pt-20 md:pt-24 pb-24 md:pb-12 px-4 md:px-8 max-w-4xl mx-auto w-full">
<div class="mb-8 flex items-center justify-between">
<div>
<h1 class="text-3xl font-bold tracking-tight text-on-surface">Record New Trade</h1>
<p class="text-sm text-on-surface-variant mt-1">Log your entry, execution details, and psychology.</p>
</div>
<button class="hidden md:flex text-on-surface-variant hover:text-on-surface text-sm items-center gap-1 transition-colors">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                Back to Journal
            </button>
</div>
<!-- Glassmorphism Form Card -->
<div class="bg-surface-container-highest/60 backdrop-blur-[30px] rounded-xl p-6 md:p-8 shadow-[0_12px_32px_rgba(11,19,38,0.4)] border-t border-on-surface/10 relative overflow-hidden">
<!-- Subtle gradient glow in background -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-container/20 rounded-full blur-[80px] pointer-events-none"></div>
<form class="relative z-10 space-y-8">
<!-- Section 1: Execution Details -->
<div>
<h2 class="text-lg font-semibold text-primary mb-4 border-b border-surface-container-low pb-2">Execution Details</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Trading Pair -->
<div class="space-y-2">
<label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wider">Trading Pair</label>
<input class="w-full bg-surface-container-lowest text-on-surface border border-outline-variant/30 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)] placeholder:text-outline-variant text-sm" placeholder="e.g., EUR/USD, BTC/USDT" type="text"/>
</div>
<!-- Trade Date & Time -->
<div class="space-y-2">
<label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wider">Trade Date &amp; Time</label>
<input class="w-full bg-surface-container-lowest text-on-surface border border-outline-variant/30 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)] text-sm [color-scheme:dark]" type="datetime-local"/>
</div>
<!-- Session -->
<div class="space-y-2">
<label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wider">Session</label>
<select class="w-full bg-surface-container-lowest text-on-surface border border-outline-variant/30 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)] text-sm appearance-none">
<option disabled="" selected="" value="">Select Session</option>
<option value="london">London</option>
<option value="new_york">New York</option>
<option value="tokyo">Tokyo</option>
<option value="sydney">Sydney</option>
</select>
</div>
<!-- Direction -->
<div class="space-y-2">
<label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wider">Direction</label>
<div class="flex gap-4">
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="direction" type="radio"/>
<div class="w-full text-center py-3 bg-surface-container-lowest border border-outline-variant/30 rounded-lg text-sm text-on-surface-variant peer-checked:bg-secondary/20 peer-checked:text-secondary peer-checked:border-secondary transition-all">
                                        Long
                                    </div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="direction" type="radio"/>
<div class="w-full text-center py-3 bg-surface-container-lowest border border-outline-variant/30 rounded-lg text-sm text-on-surface-variant peer-checked:bg-tertiary/20 peer-checked:text-tertiary peer-checked:border-tertiary transition-all">
                                        Short
                                    </div>
</label>
</div>
</div>
</div>
</div>
<!-- Section 2: Pricing & Outcome -->
<div>
<h2 class="text-lg font-semibold text-primary mb-4 border-b border-surface-container-low pb-2">Pricing &amp; Outcome</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<!-- Entry Price -->
<div class="space-y-2">
<label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wider">Entry Price</label>
<input class="w-full bg-surface-container-lowest text-on-surface border border-outline-variant/30 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)] font-mono text-sm" placeholder="0.0000" step="any" type="number"/>
</div>
<!-- Take Profit -->
<div class="space-y-2">
<label class="block text-xs font-medium text-secondary uppercase tracking-wider">Take Profit</label>
<input class="w-full bg-surface-container-lowest text-on-surface border border-outline-variant/30 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)] font-mono text-sm" placeholder="0.0000" step="any" type="number"/>
</div>
<!-- Stop Loss -->
<div class="space-y-2">
<label class="block text-xs font-medium text-tertiary uppercase tracking-wider">Stop Loss</label>
<input class="w-full bg-surface-container-lowest text-on-surface border border-outline-variant/30 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-tertiary focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)] font-mono text-sm" placeholder="0.0000" step="any" type="number"/>
</div>
<!-- PNL Amount -->
<div class="space-y-2 md:col-span-3">
<label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wider">Realized PNL ($)</label>
<input class="w-full md:w-1/3 bg-surface-container-lowest text-on-surface border border-outline-variant/30 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)] font-mono text-lg" placeholder="0.00" step="any" type="number"/>
</div>
</div>
</div>
<!-- Section 3: Psychology & Analysis -->
<div>
<h2 class="text-lg font-semibold text-primary mb-4 border-b border-surface-container-low pb-2">Analysis &amp; Psychology</h2>
<div class="space-y-6">
<!-- Strategy Tags (Multi-select simulated via pills) -->
<div class="space-y-3">
<label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wider">Strategy Applied</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-1.5 rounded-full text-xs font-medium bg-primary-container text-on-primary-container transition-colors" type="button">Scalping</button>
<button class="px-4 py-1.5 rounded-full text-xs font-medium bg-surface-container border border-outline-variant/50 text-on-surface-variant hover:bg-surface-container-high transition-colors" type="button">Breakout</button>
<button class="px-4 py-1.5 rounded-full text-xs font-medium bg-surface-container border border-outline-variant/50 text-on-surface-variant hover:bg-surface-container-high transition-colors" type="button">Trend Following</button>
<button class="px-4 py-1.5 rounded-full text-xs font-medium bg-surface-container border border-outline-variant/50 text-on-surface-variant hover:bg-surface-container-high transition-colors" type="button">Reversal</button>
<button class="px-4 py-1.5 rounded-full text-xs font-medium bg-surface-container border border-outline-variant/50 text-on-surface-variant hover:bg-surface-container-high transition-colors border-dashed flex items-center gap-1" type="button">
<span class="material-symbols-outlined text-[14px]">add</span> New Tag
                                </button>
</div>
</div>
<!-- Emotion / Notes Textarea -->
<div class="space-y-2">
<label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wider">Trade Notes &amp; Psychology</label>
<textarea class="w-full bg-surface-container-lowest text-on-surface border border-outline-variant/30 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)] text-sm resize-none" placeholder="What were you feeling during execution? Did you follow your rules?" rows="4"></textarea>
</div>
</div>
</div>
<!-- Submit Action -->
<div class="pt-6 border-t border-surface-container-low flex justify-end gap-4">
<button class="px-6 py-3 rounded-lg text-sm font-medium text-on-surface-variant hover:text-on-surface border border-outline-variant/30 hover:bg-surface-container-high transition-all" type="button">
                        Cancel
                    </button>
<button class="px-8 py-3 rounded-lg text-sm font-bold text-white bg-gradient-to-br from-primary to-primary-container hover:shadow-[0_0_20px_rgba(79,70,229,0.4)] transition-all shadow-lg shadow-primary-container/20 flex items-center gap-2" type="submit">
<span class="material-symbols-outlined text-[18px]">save</span>
                        Save Trade
                    </button>
</div>
</form>
</div>
</main>
<!-- BottomNavBar (Mobile) -->
<nav class="md:hidden bg-[#161f31]/90 backdrop-blur-2xl fixed bottom-0 w-full rounded-t-xl z-50 border-t border-[#dae2fd]/10 shadow-[0_-8px_24px_rgba(0,0,0,0.5)] fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3">
<a class="flex flex-col items-center justify-center text-[#c7c4d8] p-2 hover:text-[#dae2fd] active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]">grid_view</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#4f46e5] text-white rounded-xl p-2 scale-110 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]">add_box</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest">Log</span>
</a>
<a class="flex flex-col items-center justify-center text-[#c7c4d8] p-2 hover:text-[#dae2fd] active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]">auto_awesome_motion</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest">Grid</span>
</a>
<a class="flex flex-col items-center justify-center text-[#c7c4d8] p-2 hover:text-[#dae2fd] active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]">account_balance_wallet</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest">Vault</span>
</a>
</nav>
</body></html>
